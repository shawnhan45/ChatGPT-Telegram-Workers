name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '0 5 * * *'   # 每天北京时间 13:00 (GMT+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Sync & Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git remote | grep -qF upstream; then
            git remote set-url upstream https://github.com/TBXark/ChatGPT-Telegram-Workers.git
          else
            git remote add upstream https://github.com/TBXark/ChatGPT-Telegram-Workers.git
          fi

          if ! git fetch upstream master; then
            echo "::warning::Failed to fetch upstream, skipping sync"
            exit 0
          fi

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Already up to date with upstream."
          else
            echo "Upstream has new commits, merging..."
            if ! git merge upstream/master -m "Auto-sync from upstream" --allow-unrelated-histories; then
              echo "::warning::Merge conflict, skipping sync"
              git merge --abort
              exit 0
            fi
            git push origin HEAD:master || echo "::warning::Failed to push"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Wrangler config
        run: |
          # 用仓库自带的模板，替换 KV namespace ID
          cp wrangler-example.toml wrangler.toml
          # 把模板里的空 id 替换成 secrets 中的真实 KV ID
          sed -i "s|id = ''|id = '${{ secrets.WRANGLER_KV_ID }}'|" wrangler.toml
          # 环境变量由 Cloudflare Dashboard 管理，不在部署中覆盖
          # 如果 wrangler.toml 模板中有 [vars] 段，注释掉以免覆盖
          sed -i '/^\[vars\]/,$ s/^\([^#]\)/#\1/' wrangler.toml

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Build project
        run: pnpm run build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: pnpm run wrangler deploy --config=wrangler.toml > /dev/null

      - name: Verify deployment
        run: |
          url=${{ secrets.CF_WORKERS_DOMAIN }}
          if [ -z "$url" ]; then
            echo "::warning::CF_WORKERS_DOMAIN is not set"
          else
            echo "Verifying deployment at https://$url"
            curl -s -o /dev/null -w "HTTP %{http_code}" https://$url
          fi
